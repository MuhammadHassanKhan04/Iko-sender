<script>
  window.onerror = function(message, source, lineno, colno, error) {
    var div = document.createElement('div');
    div.style.position = 'fixed';
    div.style.top = '0';
    div.style.left = '0';
    div.style.width = '100%';
    div.style.height = '100%';
    div.style.backgroundColor = 'rgba(0,0,0,0.95)';
    div.style.color = '#ff3333';
    div.style.padding = '30px';
    div.style.fontFamily = 'monospace';
    div.style.zIndex = '999999';
    div.style.overflow = 'auto';
    div.style.boxSizing = 'border-box';
    div.innerHTML = '<h1>Global JS Error Caught</h1>' +
                    '<p><strong>Message:</strong> ' + message + '</p>' +
                    '<p><strong>Source:</strong> ' + source + '</p>' +
                    '<p><strong>Line:</strong> ' + lineno + ' | <strong>Col:</strong> ' + colno + '</p>' +
                    '<pre style="color: #eee; background: #222; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-break: break-all;">' + (error && error.stack || 'No stack trace') + '</pre>';
    document.body.appendChild(div);
    return false;
  };
  window.addEventListener('unhandledrejection', function(event) {
    var div = document.createElement('div');
    div.style.position = 'fixed';
    div.style.top = '0';
    div.style.left = '0';
    div.style.width = '100%';
    div.style.height = '100%';
    div.style.backgroundColor = 'rgba(0,0,0,0.95)';
    div.style.color = '#ffaa00';
    div.style.padding = '30px';
    div.style.fontFamily = 'monospace';
    div.style.zIndex = '999999';
    div.style.overflow = 'auto';
    div.style.boxSizing = 'border-box';
    div.innerHTML = '<h1>Unhandled Promise Rejection</h1>' +
                    '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
                    '<pre style="color: #eee; background: #222; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-break: break-all;">' + (event.reason && event.reason.stack || 'No stack trace') + '</pre>';
    document.body.appendChild(div);
  });
</script>
